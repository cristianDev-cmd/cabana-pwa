# Cloudflare Wrangler Configuration - CabanaPWA
# Runtime: Next.js + Cloudflare Pages with Functions
name = "cabana-pwa"
compatibility_date = "2026-06-24"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ============================================
# D1 Database (SQLite-based)
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "cabana-pwa-db"
database_id = "e2e119db-3f90-460d-afba-22d4f65d2a55"
migrations_dir = "./migrations"

# ============================================
# R2 Object Storage (Images, PDFs)
# ============================================
[[r2_buckets]]
binding = "STORAGE"
bucket_name = "cabana-pwa-media"

# ============================================
# Environment variables
# ============================================
[vars]
APP_NAME = "CabanaPWA"
APP_URL = "https://cabana-pwa.pages.dev"

# ============================================
# Production environment
# ============================================
[env.production]
name = "cabana-pwa-production"

# ============================================
# Preview environment (for PRs and branch deploys)
# ============================================
[env.preview]
name = "cabana-pwa-preview"
