# Cloudflare Wrangler Configuration - CabanaPWA
# Runtime: Next.js + Cloudflare Pages with Functions
name = "cabana-pwa"
compatibility_date = "2026-06-24"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# ============================================
# D1 Database (SQLite-based)
# ============================================
[[d1_databases]]
binding = "DB"
database_name = "cabana-pwa-db"
database_id = "e2e119db-3f90-460d-afba-22d4f65d2a55"
preview_database_id = "cabana-pwa-db-preview"
migrations_dir = "./migrations"

# ============================================
# R2 Object Storage (Images, PDFs) — enable via Cloudflare Dashboard first
# [[r2_buckets]]
# binding = "STORAGE"
# bucket_name = "cabana-pwa-media"
# preview_bucket_name = "cabana-pwa-media-preview"

# ============================================
# Environment variables
# ============================================
[vars]
APP_NAME = "CabanaPWA"
APP_URL = "https://cabana-pwa.pages.dev"

# ============================================
# Production environment
# ============================================
[env.production]
name = "cabana-pwa-production"

[[env.production.d1_databases]]
binding = "DB"
database_name = "cabana-pwa-db-prod"
database_id = ""
migrations_dir = "./migrations"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "cabana-pwa-media-prod"

# ============================================
# Preview environment (for PRs and branch deploys)
# ============================================
[env.preview]
name = "cabana-pwa-preview"
